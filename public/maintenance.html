<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caveo CRM — Maintenance</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0F1115;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 480px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #C8102E;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      color: #9ca3af;
      font-size: 15px;
      line-height: 1.6;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #C8102E;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .status {
      margin-top: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Caveo CRM</div>
    <h1>Scheduled Maintenance</h1>
    <p>We are upgrading the database for improved performance and reliability.<br>We'll be back in approximately <strong style="color:#fff">15–30 minutes</strong>.</p>
    <div class="status"><span class="dot"></span>Upgrade in progress</div>
  </div>
</body>
</html>
